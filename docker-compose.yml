  services:
    redis:
      image: redis:7-alpine
      container_name: redis
      ports:
        - "6379:6379"
      restart: unless-stopped
      mem_limit: 128m
      command: redis-server --appendonly yes
      volumes:
        - redis_data:/data
    # 블루 배포
    app-blue:
      image: ddhi7/ccapp:latest #이미지는 동일 이미지 사용 : (깃허브 플젝 -> ccapp 이미지)
      container_name: ccapp-blue
      ports:
        - "8081:8080"
      env_file:
        - .env
      restart: unless-stopped
      pull_policy: always
      mem_limit: 400m
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      depends_on:
        - redis
        - kafka  #추가

    app-green:
      #그린 배포
      image: ddhi7/ccapp:latest
      container_name: ccapp-green
      ports:
        - "8082:8080"
      env_file:
        - .env
      restart: unless-stopped
      pull_policy: always
      mem_limit: 400m
      healthcheck:
        test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      depends_on:
        - redis
        - kafka #추가


    kafka:
      image: confluentinc/cp-kafka:latest
      container_name: kafka
      ports:
        - "9092:9092"      # 도커 내부 통신용
        - "29092:29092"    # 로컬호스트 접속용
      environment:
        # 필수 KRaft 설정
        CLUSTER_ID: "hjeeg3q1SoCw7IKoRw-rMQ"
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: "broker,controller"  # 브로커와 컨트롤러 역할
        KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"  # 컨트롤러 지정

        # 리스너 설정 (CONTROLLER 추가 필수)
        KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092'
        KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
        KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'

        # Mac(ARM) 호환 설정 및 성능 최적화
        _JAVA_OPTIONS: "-XX:UseSVE=0"
        KAFKA_HEAP_OPTS: "-Xms256M -Xmx256M"   # JVM 힙 메모리
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      volumes:
        - kafka_data:/var/lib/kafka/data   # <- Docker 내부 볼륨만 사용
      restart: unless-stopped

    kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: kafka-ui
      ports:
        - "8085:8080"  # 호스트 8085로 접속 가능
      environment:
        KAFKA_CLUSTERS_0_NAME: local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
        KAFKA_CLUSTERS_0_ZOOKEEPER: ""  # KRaft 모드라 Zookeeper 필요 없음
      depends_on:
        - kafka
      restart: unless-stopped

  volumes:
    redis_data:
      driver: local
    kafka_data: