services:
  # 블루 배포
  app-blue:
    image: ddhi7/ccapp:latest
#    container_name: ccapp-blue
    ports:
      - "8081:8080"
    env_file:
      - .env
    restart: unless-stopped
    pull_policy: always
    mem_limit: 400m

  app-green:
    #그린 배포
    image: ddhi7/ccapp:latest
#    container_name: ccapp-green
    ports:
      - "8082:8080"
    env_file:
      - .env
    restart: unless-stopped
    pull_policy: always
    mem_limit: 400m
