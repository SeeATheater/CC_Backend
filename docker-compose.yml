version: '3.8'

services:
  app-blue:
    image: ddhi7/ccapp:latest
    container_name: ccapp-blue
    ports:
      - "8081:8080"
    env_file:
      - .env
    restart: always

  app-green:
    image: ddhi7/ccapp:latest
    container_name: ccapp-green
    ports:
      - "8082:8080"
    env_file:
      - .env
    restart: always
