version: '3.8'

services:
  app:
    image: ddhi7/ccapp  # Docker Hub 이미지명
    container_name: ccapp
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always
  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: always