services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    mem_limit: 128m
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  # 블루 배포
  app-blue:
    image: ddhi7/ccapp:latest #이미지는 동일 이미지 사용 : (깃허브 플젝 -> ccapp 이미지)
    container_name: ccapp-blue
    ports:
      - "8081:8080"
    env_file:
      - .env
    restart: unless-stopped
    pull_policy: always
    mem_limit: 400m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

  app-green:
    #그린 배포
    image: ddhi7/ccapp:latest
    container_name: ccapp-green
    ports:
      - "8082:8080"
    env_file:
      - .env
    restart: unless-stopped
    pull_policy: always
    mem_limit: 400m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis

volumes:
  redis_data:
    driver: local