#application.yml
server:
  port: 8080
  forward-headers-strategy: native
spring:
  profiles:
    default: ${SPRING_PROFILES_ACTIVE} # 기본 실행 환경
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: Google
  data:
    redis:
      host: localhost
      port: 6379


url:
  access-token: https://oauth2.googleapis.com/token
  profile: https://www.googleapis.com/oauth2/v2/userinfo

  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

logging:
  level:
    org:
      springframework:
        security:
          oauth2: DEBUG
          web: DEBUG
        web:
          client: DEBUG
    root: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

