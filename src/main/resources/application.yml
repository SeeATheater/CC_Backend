#application.yml
server:
  port: 8080
  forward-headers-strategy: native
spring:
  profiles:
    default: ${SPRING_PROFILES_ACTIVE} # 기본 실행 환경
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI}
            authorization-grant-type: authorization_code
            client-name: Google


url:
  access-token: https://oauth2.googleapis.com/token
  profile: https://www.googleapis.com/oauth2/v2/userinfo

  jpa:
    hibernate:
      ddl-auto: update

jwt:
  secret: ${JWT_SECRET}