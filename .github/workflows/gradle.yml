name: CI/CD with Blue-Green Deployment

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || 'ccapp' }}
  DOCKER_TAG: ${{ vars.DOCKER_TAG || 'latest' }}
  DEPLOY_USER: ${{ vars.DEPLOY_USER || 'ubuntu' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/home/ubuntu/ccapp' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 레포 체크아웃 (소스코드 가져옴)
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle 8.13 설정 및 캐시
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      # 4. Gradle Build (테스트 제외)
      - name: Build with Gradle (skip tests)
        run: gradle build -x test

      # 5. Docker Build & Push
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        run: |
          echo "🔨 Building Docker image..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${DOCKER_IMAGE}:${DOCKER_TAG} .
          
          echo "🔐 Logging into Docker Hub..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          
          echo "📤 Pushing to Docker Hub..."
          docker push ${{ secrets.DOCKER_USERNAME }}/${DOCKER_IMAGE}:${DOCKER_TAG}

      # 6. 배포 파일들을 EC2로 복사
      - name: Copy deployment files to EC2
        if: github.event_name != 'pull_request'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "docker-compose.yml,switch-blue-green.sh,health-check.sh,rollback.sh"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      # 7. EC2에서 블루그린 배포 실행
      - name: Deploy with Blue-Green strategy
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd "${{ env.DEPLOY_PATH }}"
            
            echo "🔒 Docker Hub Login"
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            echo "📦 Pull latest images"
            export APP_IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
            docker compose pull
            
            chmod +x switch-blue-green.sh health-check.sh rollback.sh
            
            echo "🔄 Execute Blue-Green deployment with auto rollback"
            if ./switch-blue-green.sh; then
              echo "✅ Deployment completed successfully"
            else
              echo "❌ Deployment failed, check rollback logs"
              if [ -f /tmp/rollback.log ]; then
                echo "📋 Rollback logs:"
                cat /tmp/rollback.log
              fi
              exit 1
            fi
