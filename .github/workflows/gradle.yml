name: Java CI with Gradle

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Git 저장소 체크아웃
      - uses: actions/checkout@v3
        name: Checkout repository

      # 2. JDK 17 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. gradlew 실행 권한 부여
      - name: Run chmod to make gradlew executable
        run: chmod +x ./gradlew

      # 4. Gradle 빌드 (테스트 제외)
      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test

      # 5. 빌드 결과물 업로드
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cicdsample
          path: build/libs/*.jar

      # 6. JAR 파일을 원격 서버로 복사 
      - name: Copy jar file to remote
        uses: appleboy/scp-action@v0.1.7
        with:
          username: ubuntu
          host: ${{ secrets.HOST }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "./build/libs/*.jar"
          target: "/home/ubuntu/cicd"
          strip_components: 2

      # 7. 배포 스크립트(deploy.sh)도 원격 서버로 복사 (깃허브에 있는 deploy.sh를 서버로 복사)
      - name: Copy deploy script file to remote
        uses: appleboy/scp-action@v0.1.7
        with:
          username: ubuntu
          host: ${{ secrets.HOST }}
          key: ${{ secrets.PRIVATE_KEY }}
          source: "deploy.sh"
          target: "/home/ubuntu/cicd"

      # 8. 원격 서버에서 배포 스크립트 실행 (환경변수 직접 export)
      - name: Execute deploy script on remote server
        uses: appleboy/ssh-action@v0.1.10
        with:
          username: ubuntu
          host: ${{ secrets.HOST }}
          key: ${{ secrets.PRIVATE_KEY }}
          script_stop: true
          script: |
            echo "====================[ 배포 환경변수 세팅 ]===================="
            export PROD_DB_URL="${{ secrets.PROD_DB_URL }}"
            export PROD_DB_USERNAME="${{ secrets.PROD_DB_USERNAME }}"
            export PROD_DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            echo "====================[ 배포 스크립트 실행 ]===================="
            cd /home/ubuntu/cicd
            chmod +x deploy.sh
            ./deploy.sh
            echo "====================[ 배포 스크립트 종료 ]===================="
