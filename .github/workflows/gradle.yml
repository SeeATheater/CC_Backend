name: CI/CD with Gradle + Docker Compose

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub 레포 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. gradlew 권한 부여
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4. Gradle Build (테스트 제외)
      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test

      # 5. Docker Build & Push
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ccapp .
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/ccapp

      # 6. docker-compose.yml EC2로 복사
      - name: Copy docker-compose.yml to EC2
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          source: docker-compose.yml
          target: /home/ubuntu/ccapp

      # 7. EC2에서 Docker Compose로 배포 (down 추가)
      - name: Deploy on EC2
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/ccapp
            echo "🔒 Docker Hub Login"
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "🛑 Stop & remove old containers"
            docker compose down

            echo "📦 Pull latest image & restart"
            docker compose pull
            docker compose up -d --build
